name: Release Core

on:
  push:
    tags:
      - 'core-v*'

jobs:
  publish:
    name: Publish @skillet-cli/core to npm
    runs-on: ubuntu-latest
    concurrency:
      group: release-core-${{ github.sha }}
      cancel-in-progress: false
    permissions:
      id-token: write  # required for npm provenance via OIDC Trusted Publishers
    steps:
      - name: Validate semver tag
        run: |
          [[ "$TAG" =~ ^core-v[0-9]+\.[0-9]+\.[0-9]+$ ]]
        env:
          TAG: ${{ github.ref_name }}
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          LEFTHOOK: 0
      - run: pnpm --filter @skillet-cli/ui build
      - run: pnpm -F @skillet-cli/core publish --access public --no-git-checks --provenance
