name: Release Core

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  publish:
    name: Publish @skillet-cli/core to npm
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'core-v')
    concurrency:
      group: release-core-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      - name: Validate semver tag
        run: |
          [[ "$BRANCH" =~ ^core-v[0-9]+\.[0-9]+\.[0-9]+$ ]]
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          LEFTHOOK: 0
      - run: pnpm --filter @skillet-cli/ui build
      - run: pnpm -F @skillet-cli/core publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
