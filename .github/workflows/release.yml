name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # For a tag push (e.g. v1.0.0), GitHub sets head_branch to the tag name itself,
    # so startsWith(..., 'v') correctly matches only tag-triggered CI runs.
    # Branches that happen to start with 'v' are caught by the semver validation step below.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    concurrency:
      group: release-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false
    steps:
      - name: Validate semver tag
        run: |
          [[ "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        env:
          LEFTHOOK: 0
      - run: pnpm -F @skillet-cli/core publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
