pre-commit:
  jobs:
    - name: biome
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true
      glob: "*.{js,ts,jsx,tsx,json,mjs}"
    - name: typecheck
      run: pnpm -F @skillet-cli/core typecheck

commit-msg:
  jobs:
    - name: conventional-commits
      run: node scripts/check-commit-msg.mjs {1}
